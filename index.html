<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  min-height: 100vh;
  overflow-y: auto;

  display: flex;
  flex-direction: column;
  align-items: center;

  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url("https://raw.githubusercontent.com/dhamibhagwati47-pixel/Birthday-surprise/main/photo.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ❤️ Button */
button {
  margin-top: 60px;
  padding: 14px 26px;
  font-size: 16px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.6);
  animation: beat 1.2s infinite;
}

@keyframes beat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* 💌 Messages */
#message {
  margin-top: 20px;
  width: 90%;
  max-width: 650px;
  text-align: center;
  font-size: clamp(16px, 4vw, 20px);
  line-height: 1.8;
}

#message p {
  margin: 10px 0;
}

.fade {
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(15px);}
  to {opacity: 1; transform: translateY(0);}
}

/* ❤️ floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  from {
    transform: translateY(0);
    opacity: 1;
  }
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<button id="loveBtn" onclick="startExperience()">This is all my love for you… Tap ❤️</button>

<div id="message"></div>

<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
  "Happy Birthday my love ❤️🎂",
  "Even though we are miles apart, you are always in my heart 💖🌍",
  "I keep thinking about all our beautiful moments together 🥺✨",
  "All the time we’ve spent together means everything to me ❤️",
  "Distance can never reduce the love I feel for you 💕",
  "I can’t wait to be with you and create more memories together 😘",
  "I dream of celebrating all your future birthdays together 🏡🎂",
  "Love you endlessly… Happy Birthday once again ❤️🎉",
  "Yours Bhagwati ❤️"
];

let index = 0;
let heartInterval;

// Start all
function startExperience() {
  document.getElementById("loveBtn").style.display = "none";

  let music = document.getElementById("bgMusic");
  music.volume = 0.2;
  music.play();

  // hearts every 500ms
  heartInterval = setInterval(createHearts, 500);

  // messages every 3 seconds
  let msgInterval = setInterval(() => {
    if (index < messages.length) {
      showMessage();
    } else {
      clearInterval(msgInterval);
      clearInterval(heartInterval);
    }
  }, 3000);
}

// show one message
function showMessage() {
  let msg = document.createElement("p");
  msg.className = "fade";
  msg.innerText = messages[index];
  document.getElementById("message").appendChild(msg);
  index++;
}

// create hearts
function createHearts() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (4 + Math.random() * 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 7000);
}
</script>

</body>
</html>
