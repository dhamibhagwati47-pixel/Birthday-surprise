<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  margin-top: 80px;
  color: white;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d88;
}

#message {
  margin-top: 30px;
  font-size: 22px;
  line-height: 1.6;
}
</style>
</head>

<body>

<h2>Click for your surprise ❤️</h2>
<button onclick="showMessage()">Tap Me 💖</button>

<div id="message"></div>

<script>
let messages = [
"Happy Birthday my love ❤️",
"I miss you so much 🥺",
"I wish I could hug you right now 🤗",
"Distance can't change my love 💕",
"You are always in my heart 💖",
"I can't wait to see you 😔",
"You are my everything ❤️",
"My love grows every day 🌸",
"Soon we’ll celebrate together 🎂",
"I LOVE YOU FOREVER ❤️"
];

let index = 0;

function showMessage() {
  if (index < messages.length) {
    document.getElementById("message").innerHTML += 
      "<p>" + messages[index] + "</p>";
    index++;
  }
}
</script>

</body>
</html>
