<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>

<style>
body {
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  overflow-x: hidden;
  color: white;

  /* Background photo + fade */
  background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url("https://raw.githubusercontent.com/dhamibhagwati47-pixel/Birthday-surprise/main/photo.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Button */
button {
  margin-top: 80px;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* Messages */
#message {
  margin-top: 30px;
  font-size: 22px;
  line-height: 1.8;
  padding: 0 20px;
}

/* Fade animation */
.fade {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 18px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity:1;}
  100% {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<button onclick="showMessage()">Tap for your surprise ❤️</button>

<div id="message"></div>

<!-- Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
"Happy Birthday my love ❤️",
"I miss you so much 🥺",
"I wish I could hug you right now 🤗",
"Distance can't change my love 💕",
"You are always in my heart 💖",
"I can't wait to see you 😔",
"You are my everything ❤️",
"My love grows stronger every day 🌸",
"Soon we’ll celebrate together 🎂",
"I LOVE YOU FOREVER ❤️"
];

let index = 0;

// slow volume
document.getElementById("bgMusic").volume = 0.2;

function showMessage() {
  if (index < messages.length) {
    let msg = document.createElement("p");
    msg.className = "fade";
    msg.innerText = messages[index];
    document.getElementById("message").appendChild(msg);

    createHearts();
    index++;
  }
}

function createHearts() {
  for (let i = 0; i < 4; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }
}
</script>

</body>
</html>
