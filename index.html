<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>

<style>
body {
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  color: white;

  height: 100vh;
  overflow: hidden;

  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url("https://raw.githubusercontent.com/dhamibhagwati47-pixel/Birthday-surprise/main/photo.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* Button center */
button {
  position: absolute;
  top: 10%;
  left: 30%;
  transform: translate(-50%, -50%);
  
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* Message box (scrollable) */
#message {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translateX(-50%, -50%);
  width: 85%;
  max-height: 40vh;
  overflow-y: auto;
  font-size: 20px;
  line-height: 1.6;
  text-align: center;
}

/* spacing between lines */
#message p {
  margin: 8px 0;
}

/* Fade animation */
.fade {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 18px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity:1;}
  100% {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<button onclick="showMessage()">This is all my love for you… tap ❤️</button>

<div id="message"></div>

<!-- Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
"Happy Birthday my love ❤️",
"I wish I could be there with you today 🥺",
"Every moment feels incomplete without you 💔",
"I miss your hugs more than anything 🤗",
"No matter how far we are… you are always with me 💖",
"You are not just my love… you are my home 🏡❤️",
"I close my eyes and feel you right beside me 🥹",
"Distance is hard… but loving you is the easiest thing 💕",
"I can't wait to hold you again 😔❤️",
"Till then… all my love is right here for you 💌",
"I LOVE YOU FOREVER ❤️"
];

let index = 0;

// slow music
document.getElementById("bgMusic").volume = 0.2;

function showMessage() {
  if (index < messages.length) {
    let msg = document.createElement("p");
    msg.className = "fade";
    msg.innerText = messages[index];
    document.getElementById("message").appendChild(msg);

    createHearts();
    index++;
  }
}

function createHearts() {
  for (let i = 0; i < 4; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }
}
</script>

</body>
</html>
