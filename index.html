<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  margin-top: 100px;
  color: #fff;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background: white;
  color: #ff4d88;
}

#message {
  margin-top: 30px;
  font-size: 24px;
  animation: fade 1s;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<h2>Click for your surprise ❤️</h2>
<button onclick="showMessage()">Click</button>

<div id="message"></div>

<!-- Background Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
"Happy Birthday my love ❤️",
"I miss you so much today 🥺",
"Distance can't reduce my love 💕",
"I wish I was there with you 😔",
"You are always in my heart 💖",
"I can't wait to hug you 🤗",
"You are my everything ❤️",
"My love grows stronger every day 🌸",
"Soon we will celebrate together 🎂",
"I love you forever ❤️"
];

let index = 0;

function showMessage() {
  if (index < messages.length) {
    document.getElementById("message").innerText = messages[index];
    index++;
  } else {
    document.getElementById("message").innerText = "Forever yours ❤️";
  }
}
</script>

</body>
</html>
