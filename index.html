<!DOCTYPE html>
<html>
<head>
<title>For My Love ❤️</title>

<style>
body {
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  color: white;

  height: 100vh;
  overflow: hidden;

  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url("https://raw.githubusercontent.com/dhamibhagwati47-pixel/Birthday-surprise/main/photo.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* ❤️ Button (heartbeat + top position) */
button {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.6);

  animation: beat 1.2s infinite;
}

@keyframes beat {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.08); }
}

/* 💌 Messages just below button */
#message {
  position: absolute;
  top: 28%;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-height: 60vh;
  overflow-y: auto;
  font-size: 20px;
  line-height: 1.6;
  text-align: center;
}

/* spacing between lines */
#message p {
  margin: 6px 0;
}

/* fade animation */
.fade {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 18px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity:1;}
  100% {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<button onclick="showMessage()">This is all my love for you… tap ❤️</button>

<div id="message"></div>

<!-- 🎵 Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
"Happy Birthday my love ❤️",
"From our first moment… everything feels special 🥰",
"All the time we’ve spent together means everything to me 💖",
"You make even the simplest days feel magical ✨",
"I love our laughs, our talks… everything about us ❤️",
"You understand me like no one else 🥹",
"Being with you feels so easy and right 💕",
"I see my future… and it has you in it 💖",
"There’s so much more I want to live with you ❤️",
"And I’ll keep choosing you… every single day 💞",
"I LOVE YOU FOREVER ❤️"
];

let index = 0;

// 🎵 soft volume
document.getElementById("bgMusic").volume = 0.2;

function showMessage() {
  if (index < messages.length) {
    let msg = document.createElement("p");
    msg.className = "fade";
    msg.innerText = messages[index];
    document.getElementById("message").appendChild(msg);

    createHearts();
    index++;
  }
}

function createHearts() {
  for (let i = 0; i < 4; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }
}
</script>

</body>
</html>
