<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;

  min-height: 100vh;
  overflow-y: auto;

  display: flex;
  flex-direction: column;
  align-items: center;

  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url("https://raw.githubusercontent.com/dhamibhagwati47-pixel/Birthday-surprise/main/photo.jpeg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ❤️ Button */
button {
  margin-top: 60px;
  padding: 14px 26px;
  font-size: 16px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d88;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.6);

  animation: beat 1.2s infinite;
}

@keyframes beat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* 💌 Messages */
#message {
  margin-top: 20px;
  width: 90%;
  max-width: 600px;
  text-align: center;

  font-size: clamp(16px, 4vw, 20px);
  line-height: 1.6;
}

#message p {
  margin: 8px 0;
}

/* fade */
.fade {
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* ❤️ hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 18px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity:1;}
  100% {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<button onclick="startExperience()">This is all my love for you… tap ❤️</button>

<div id="message"></div>

<!-- 🎵 Music -->
<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let messages = [
"Happy Birthday my love ❤️",
"From our first moment… everything feels special 🥰",
"All the time we’ve spent together means everything to me 💖",
"You make even the simplest days feel magical ✨",
"I love our laughs, our talks… everything about us ❤️",
"You understand me like no one else 🥹",
"Being with you feels so easy and right 💕",
"I see my future… and it has you in it 💖",
"There’s so much more I want to live with you ❤️",
"And I’ll keep choosing you… every single day 💞",
"I LOVE YOU FOREVER ❤️"
];

let index = 0;

// 🎵 start experience (tap pe music + first message)
function startExperience() {
  let music = document.getElementById("bgMusic");
  music.play();
  music.volume = 0.2;

  showMessage();
}

// messages
function showMessage() {
  if (index < messages.length) {
    let msg = document.createElement("p");
    msg.className = "fade";
    msg.innerText = messages[index];
    document.getElementById("message").appendChild(msg);

    createHearts();
    index++;
  }
}

// hearts
function createHearts() {
  for (let i = 0; i < 4; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }
}
</script>

</body>
</html>
